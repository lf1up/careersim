<text id="Score Text" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="18" font-weight="bold" letter-spacing="0em"><tspan x="846" y="568.045">Clarity 86 &#xb7; Confidence 78 &#xb7; Evidence 91</tspan></text>
<text id="Coaching Tip" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="15" font-weight="500" letter-spacing="0em"><tspan x="846" y="599.955">Try naming a specific range earlier, then pause. You justified </tspan><tspan x="846" y="619.955">the ask well.</tspan></text>
