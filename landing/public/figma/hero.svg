<text id="Persona Message" fill="#111827" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="16" font-weight="500" letter-spacing="0em"><tspan x="850" y="300.318">&#x201c;Your current offer is already at the top of our band. Why </tspan><tspan x="850" y="322.318">do you feel an adjustment is warranted?&#x201d;</tspan></text>
