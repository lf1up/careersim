<text id="User Message" fill="#111827" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="16" font-weight="500" letter-spacing="0em"><tspan x="850" y="436.318">&#x201c;I&#x2019;m excited about the role. Based on scope and market </tspan><tspan x="850" y="458.318">data, I&#x2019;d like to discuss a package closer to...&#x201d;</tspan></text>
