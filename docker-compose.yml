version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Docker-specific settings that differ from local development
      DB_HOST: postgres
      REDIS_HOST: redis
      TRANSFORMERS_API_URL: http://transformers:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      transformers:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    networks:
      - careersim-network
    restart: unless-stopped
    command: >
      sh -c "
        # TODO: (Un)comment this to seed the database or reset it to a clean state
        echo 'Running database seed...' &&
        pnpm run db:seed &&
        echo 'Database seeding completed! Starting development server...' &&
        pnpm run dev
            "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - careersim-network
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: careersim
      POSTGRES_PASSWORD: careersim_password
      POSTGRES_DB: careersim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersim"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careersim-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  transformers:
    build:
      context: ./transformers
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./transformers/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source code for live reloading
      - ./transformers:/app
      # Persistent volume for model cache
      - models_cache:/app/models_cache
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r = requests.get('http://localhost:8001/', timeout=5); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--log-level", "info"]


volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  models_cache:

networks:
  careersim-network:
    driver: bridge 