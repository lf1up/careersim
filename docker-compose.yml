version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: careersim
      DB_PASSWORD: careersim_password
      DB_DATABASE: careersim
      DB_SYNCHRONIZE: true
      DB_LOGGING: false
      # JWT - Generate your own secure keys in production
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-32chars
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production-32chars
      JWT_REFRESH_EXPIRES_IN: 30d
      # Session
      SESSION_SECRET: your-super-secret-session-key-change-in-production-32chars
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # Email (configure with your SMTP provider)
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: your-email@example.com
      SMTP_PASS: your-email-password
      # AI Services (add your OpenAI API key)
      OPENAI_API_KEY: your-openai-api-key
      OPENAI_MODEL: gpt-4-turbo-preview
      OPENAI_MAX_TOKENS: 2000
      # Stripe (add your Stripe keys)
      STRIPE_SECRET_KEY: your-stripe-secret-key
      STRIPE_WEBHOOK_SECRET: your-stripe-webhook-secret
      STRIPE_PUBLISHABLE_KEY: your-stripe-publishable-key
      # File Upload
      MAX_FILE_SIZE: 10485760
      UPLOAD_PATH: ./uploads
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      # CORS
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - careersim-network
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Running database seed...' &&
        pnpm run db:seed &&
        echo 'Database seeding completed! Starting development server...' &&
        pnpm run dev
      "

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: careersim
      POSTGRES_PASSWORD: careersim_password
      POSTGRES_DB: careersim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersim"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careersim-network
    restart: unless-stopped
    command: redis-server --appendonly yes


volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  careersim-network:
    driver: bridge 