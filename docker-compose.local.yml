services:
  # =====================================================================
  # DEPRECATED SERVICES — kept commented out for reference only.
  # ---------------------------------------------------------------------
  # The following services are no longer part of the active runtime:
  #   - `backend`       → superseded by `api`  (Fastify rewrite)
  #   - `frontend`      → superseded by `web`  (Next.js 16 rewrite)
  #   - `transformers`  → absorbed into `agent` (in-process inference)
  #   - `rag`           → absorbed into `agent` (embedded Chroma DB)
  #
  # DO NOT re-enable without discussion. These directories will be removed
  # once the migration settles; see each service's README for details.
  # =====================================================================

  # DEPRECATED: replaced by the `api` service below. See ./backend/README.md.
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #     args:
  #       NODE_ENV: development
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - ./backend/.env
  #   environment:
  #     # Override Docker-specific settings that differ from local development
  #     DB_HOST: postgres
  #     REDIS_HOST: redis
  #     TRANSFORMERS_API_URL: http://host.docker.internal:8001
  #     RAG_API_URL: http://host.docker.internal:8002
  #     # Core agent service (Gradio API) - connect via gradio_client
  #     AGENT_API_URL: http://host.docker.internal:7860
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #     # agent:
  #     #   condition: service_healthy
  #     # transformers:
  #     #   condition: service_healthy
  #     # rag:
  #     #   condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules
  #     - backend_uploads:/app/uploads
  #   networks:
  #     - careersim-network
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   restart: unless-stopped
  #   command: >
  #     sh -c "
  #       # TODO: (Un)comment this to seed the database or reset it to a clean state
  #       echo 'Running database seed...' &&
  #       pnpm run db:seed &&
  #       echo 'Database seeding completed! Starting development server...' &&
  #       pnpm run dev
  #           "

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: base
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: development
      # Bind to 0.0.0.0 inside the container so Docker's port mapping to the host works.
      # `localhost`/127.0.0.1 would only be reachable from inside the container.
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: info
      # Override Docker-specific settings so containers can reach each other
      # via the compose network instead of localhost. `api/.env` ships with
      # host-oriented URLs (for `pnpm dev` on the host against ports
      # published by compose); on the compose network we rewrite them to
      # the service DNS names.
      DATABASE_URL: postgres://careersim:careersim_password@postgres:5432/careersim
      REDIS_URL: redis://redis:6379
      AGENT_API_URL: http://agent:8001
      # AGENT_INTERNAL_KEY is picked up from `./api/.env` and must match
      # the `AGENT_INTERNAL_KEY` in `./agent/.env`. Leave both unset in
      # local dev (the agent falls back to unauthenticated mode with a
      # warning); set to a matching random value in staging/prod.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      agent:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - careersim-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: >
      sh -c "
        pnpm install --frozen-lockfile=false &&
        echo 'Running database migrations...' &&
        pnpm run db:migrate &&
        echo 'Starting development server...' &&
        pnpm run dev
            "

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env
    environment:
      NODE_ENV: development
      # Poll-based watchers are more reliable across bind-mounted filesystems
      # (especially on macOS/Windows), matching the legacy `frontend` setup.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      # NEXT_PUBLIC_* is baked into the browser bundle, so it must be the URL
      # the user's browser can reach — i.e. the host-mapped api port, not the
      # compose-internal `http://api:8000`.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Server-rendered Next.js routes run inside the web container, so they
      # need the compose service DNS name to reach the API.
      API_INTERNAL_URL: http://api:8000
      # Ghost Content API — compose-internal hostname. The Content API key and
      # webhook secret still come from `./web/.env` (see web/.env.example).
      GHOST_API_URL: http://ghost:2368
    depends_on:
      api:
        condition: service_started
      ghost:
        condition: service_healthy
    volumes:
      - ./web:/app
      # Keep the image's node_modules and .next inside anonymous volumes so the
      # host's (potentially different-arch) artifacts don't leak into the
      # container.
      - /app/node_modules
      - /app/.next
    networks:
      - careersim-network
    restart: unless-stopped
    # `pnpm install` runs on boot so the anonymous node_modules volume is
    # populated on first start and stays in sync with pnpm-lock.yaml after.
    command: >
      sh -c "
        pnpm install --frozen-lockfile=false &&
        echo 'Starting Next.js dev server...' &&
        pnpm dev
            "

  # DEPRECATED: replaced by the `web` service above. See ./frontend/README.md.
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     target: development
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - ./frontend/.env
  #   environment:
  #     - CHOKIDAR_USEPOLLING=true
  #     - WATCHPACK_POLLING=true
  #     - PNPM_YES=true
  #     - CI=true
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - api
  #   networks:
  #     - careersim-network
  #   restart: unless-stopped
  #   # TODO: Remove the following two lines when the .lock file will be frozen (to fix the pnpm install issue for dev)
  #   command: >
  #     sh -c "pnpm install && pnpm run dev"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: careersim
      POSTGRES_PASSWORD: careersim_password
      POSTGRES_DB: careersim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersim"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careersim-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # =====================================================================
  # Headless Ghost CMS — editor + Content API only.
  # ---------------------------------------------------------------------
  # Next.js renders posts at /blog when NEXT_PUBLIC_BLOG_ENABLED is on.
  # Put Ghost's own frontend in Private Site Mode (Settings → General).
  # See web/README.md for the one-time setup (API key + publish webhook).
  # =====================================================================
  ghost-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ghost_root_password
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ghost_password
    volumes:
      - ghost_mysql_data:/var/lib/mysql
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ughost", "-pghost_password"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ghost:
    image: ghost:6-alpine
    ports:
      - "2368:2368"
    environment:
      # Public URL of this Ghost instance (admin UI + Content API origin).
      # Local: http://localhost:2368. Production: e.g. https://ghost.careersim.ai
      # so feature images remain browser-reachable for next/image.
      url: http://localhost:2368
      database__client: mysql
      database__connection__host: ghost-mysql
      database__connection__user: ghost
      database__connection__password: ghost_password
      database__connection__database: ghost
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      ghost-mysql:
        condition: service_healthy
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      # Ghost serves /ghost/api/admin/site/ once the HTTP server is up.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2368/ghost/api/admin/site/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./agent/.env
    environment:
      PYTHONUNBUFFERED: "1"
      # Bind to 0.0.0.0 so cross-container requests (from `api`) can reach
      # the FastAPI server; loopback would only work for the in-container healthcheck.
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: "8001"
      # Skip model preload in dev for faster startup (models load on first use)
      # SKIP_PRELOAD: "1"
    volumes:
      # Mount source + data for live reloading (optional in dev).
      - ./agent/src:/app/src
      - ./agent/data:/app/data
      # Persist the Chroma DB so embeddings survive container restarts.
      - agent_chroma_db:/app/.chroma_db
      # Logs directory on the host for easy tailing.
      - ./agent/logs:/app/logs
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      # `/health` is the cheapest FastAPI endpoint (see agent/src/careersim_agent/api/app.py).
      test: ["CMD-SHELL", "python -c \"import sys, httpx; r = httpx.get('http://localhost:8001/health', timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    command: ["python", "-m", "careersim_agent.main", "--serve", "api", "--host", "0.0.0.0", "--port", "8001"]

  # =====================================================================
  # Voice mode — self-hosted LiveKit SFU + dedicated agent worker.
  # ---------------------------------------------------------------------
  # Both services run by default; flip `VOICE_ENABLED=false` in
  # `./agent/.env` (and `./api/.env`) to disable cleanly without
  # touching this file. Voice transcripts persist via the existing
  # `api -> postgres` flow; audio is never stored.
  # =====================================================================
  livekit:
    image: livekit/livekit-server:latest
    # `--dev` enables a permissive WebRTC config (no TURN, accepts loopback)
    # which matches the local docker-compose topology. Production deploys
    # MUST swap this for a real config file with a TLS cert.
    #
    # `--node-ip 127.0.0.1` is REQUIRED for local Docker: without it, `--dev`
    # auto-advertises the container's bridge IP (172.x) and a STUN-resolved
    # public IP as ICE candidates — neither is reachable from a browser on the
    # host, so media (ICE) negotiation fails and the call drops right after the
    # room is joined. Since 7882/udp is published to the host below, the browser
    # reaches the SFU via localhost. `--udp-port 7882` pins media to the single
    # published port.
    command: ["--dev", "--bind", "0.0.0.0", "--node-ip", "127.0.0.1", "--udp-port", "7882"]
    ports:
      # 7880 — websocket signalling (browser <-> SFU)
      - "7880:7880"
      # 7881 — TURN/TLS (unused in --dev, exposed for parity with prod)
      - "7881:7881"
      # 7882 — UDP media (where the actual audio frames flow)
      - "7882:7882/udp"
    environment:
      # The dev-keys here MUST match `LIVEKIT_API_KEY` /
      # `LIVEKIT_API_SECRET` in agent/.env and api/.env. The format is
      # `key: secret` (note the space after the colon).
      LIVEKIT_KEYS: "devkey: devsecret-min-32-chars-change-me-openssl-rand-hex-32"
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      # /rtc is the SFU's healthcheck endpoint (returns 200 on a fresh process).
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent-voice:
    build:
      context: ./agent
      dockerfile: Dockerfile
      target: voice-runtime
    env_file:
      - ./agent/.env
    environment:
      PYTHONUNBUFFERED: "1"
      # Internal API URL on the compose network — the worker reaches
      # back into the API for state-for-voice + post-message; see
      # careersim_agent.voice.state_bridge.APIClient.
      VOICE_API_BASE_URL: http://api:8000
      # In-compose hostname for the LiveKit SFU — overrides the
      # default in agent/.env so contributors can leave that file as
      # the host-oriented `ws://localhost:7880` for the smoke script.
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      livekit:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./agent/src:/app/src
      - ./agent/data:/app/data
      # Persist Piper voices + faster-whisper / HuggingFace caches so
      # `docker compose down -v` doesn't force a re-download every time.
      # NOTE: the whisper cache mount path MUST match `HF_HOME` in
      # agent/Dockerfile (voice-runtime). If you change one, change both,
      # and recreate the `voice_whisper_cache` volume so the baked-in
      # model is copied into the fresh volume.
      - voice_piper_models:/app/.piper_models
      - voice_whisper_cache:/app/.hf_cache
      - ./agent/logs:/app/logs
    networks:
      - careersim-network
    restart: unless-stopped

  # DEPRECATED: model inference is now handled in-process by the `agent`
  # service. See ./transformers/README.md.
  # transformers:
  #   build:
  #     context: ./transformers
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8002:8002"
  #   env_file:
  #     - ./transformers/.env
  #   environment:
