  #   networks:
  #     - careersim-network
  #   restart: unless-stopped
  #   # TODO: Remove the following two lines when the .lock file will be frozen (to fix the pnpm install issue for dev)
  #   command: >
  #     sh -c "pnpm install && pnpm run dev"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: careersim
      POSTGRES_PASSWORD: careersim_password
      POSTGRES_DB: careersim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersim"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careersim-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./agent/.env
    environment:
      PYTHONUNBUFFERED: "1"
      # Bind to 0.0.0.0 so cross-container requests (from `api`) can reach
      # the FastAPI server; loopback would only work for the in-container healthcheck.
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: "8001"
      # Skip model preload in dev for faster startup (models load on first use)
      # SKIP_PRELOAD: "1"
    volumes:
      # Mount source + data for live reloading (optional in dev).
      - ./agent/src:/app/src
      - ./agent/data:/app/data
      # Persist the Chroma DB so embeddings survive container restarts.
      - agent_chroma_db:/app/.chroma_db
      # Logs directory on the host for easy tailing.
      - ./agent/logs:/app/logs
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      # `/health` is the cheapest FastAPI endpoint (see agent/src/careersim_agent/api/app.py).
      test: ["CMD-SHELL", "python -c \"import sys, httpx; r = httpx.get('http://localhost:8001/health', timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    command: ["python", "-m", "careersim_agent.main", "--serve", "api", "--host", "0.0.0.0", "--port", "8001"]

  # DEPRECATED: model inference is now handled in-process by the `agent`
  # service. See ./transformers/README.md.
