  #   networks:
  #     - careersim-network
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   restart: unless-stopped
  #   command: >
  #     sh -c "
  #       # TODO: (Un)comment this to seed the database or reset it to a clean state
  #       echo 'Running database seed...' &&
  #       pnpm run db:seed &&
  #       echo 'Database seeding completed! Starting development server...' &&
  #       pnpm run dev
  #           "

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: base
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: info
      # Override Docker-specific settings so containers can reach each other
      # via the compose network instead of localhost.
      DATABASE_URL: postgres://careersim:careersim_password@postgres:5432/careersim
      AGENT_API_URL: http://agent:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      agent:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - careersim-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: >
      sh -c "
        pnpm install --frozen-lockfile=false &&
        echo 'Running database migrations...' &&
        pnpm run db:migrate &&
        echo 'Starting development server...' &&
        pnpm run dev
            "

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     target: development
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - ./frontend/.env
  #   environment:
  #     - CHOKIDAR_USEPOLLING=true
  #     - WATCHPACK_POLLING=true
  #     - PNPM_YES=true
  #     - CI=true
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - api
  #   networks:
  #     - careersim-network
  #   restart: unless-stopped
  #   # TODO: Remove the following two lines when the .lock file will be frozen (to fix the pnpm install issue for dev)
  #   command: >
  #     sh -c "pnpm install && pnpm run dev"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: careersim
      POSTGRES_PASSWORD: careersim_password
      POSTGRES_DB: careersim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersim"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careersim-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./agent/.env
    environment:
      PYTHONUNBUFFERED: "1"
      # The FastAPI server listens on this port inside the container.
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: "8001"
      # Skip model preload in dev for faster startup (models load on first use)
      # SKIP_PRELOAD: "1"
    volumes:
      # Mount source + data for live reloading (optional in dev).
      - ./agent/src:/app/src
      - ./agent/data:/app/data
      # Persist the Chroma DB so embeddings survive container restarts.
      - agent_chroma_db:/app/.chroma_db
      # Logs directory on the host for easy tailing.
      - ./agent/logs:/app/logs
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      # `/health` is the cheapest FastAPI endpoint (see agent/src/careersim_agent/api/app.py).
      test: ["CMD-SHELL", "python -c \"import sys, httpx; r = httpx.get('http://localhost:8001/health', timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    command: ["python", "-m", "careersim_agent.main", "--serve", "api", "--host", "0.0.0.0", "--port", "8001"]

  # TODO: Uncomment this to obtain the dockerized transformers service (GPU acceleration could not be supported on M1/M2 Macs)
