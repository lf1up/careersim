services:
  # =====================================================================
  # DEPRECATED SERVICES — kept commented out for reference only.
  # ---------------------------------------------------------------------
  # The following services are no longer part of the active runtime:
  #   - `backend`       → superseded by `api`  (Fastify rewrite)
  #   - `frontend`      → superseded by `web`  (Next.js 15 rewrite)
  #   - `transformers`  → absorbed into `agent` (in-process inference)
  #   - `rag`           → absorbed into `agent` (embedded Chroma DB)
  #
  # DO NOT re-enable without discussion. These directories will be removed
  # once the migration settles; see each service's README for details.
  # =====================================================================

