version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Docker-specific settings that differ from local development
      DB_HOST: postgres
      REDIS_HOST: redis
      TRANSFORMERS_API_URL: http://host.docker.internal:8001
      RAG_API_URL: http://host.docker.internal:8002
      # Core agent service (Gradio API) - connect via gradio_client
      AGENT_API_URL: http://host.docker.internal:7860
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      # agent:
      #   condition: service_healthy
      # transformers:
      #   condition: service_healthy
      # rag:
      #   condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    networks:
      - careersim-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: >
      sh -c "
        # TODO: (Un)comment this to seed the database or reset it to a clean state
        echo 'Running database seed...' &&
        pnpm run db:seed &&
        echo 'Database seeding completed! Starting development server...' &&
        pnpm run dev
            "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - PNPM_YES=true
      - CI=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - careersim-network
    restart: unless-stopped
    # TODO: Remove the following two lines when the .lock file will be frozen (to fix the pnpm install issue for dev)
    command: >
      sh -c "pnpm install && pnpm run dev"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: careersim
      POSTGRES_PASSWORD: careersim_password
      POSTGRES_DB: careersim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersim-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careersim"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careersim-network
    restart: unless-stopped
    command: redis-server --appendonly yes

