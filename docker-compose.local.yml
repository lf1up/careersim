volumes:
  postgres_data:
  redis_data:
  ghost_mysql_data:
  ghost_content:
  agent_chroma_db:
  voice_piper_models:
  voice_whisper_cache:
  # backend_uploads:
  # models_cache:
  # rag_data:

networks:
  careersim-network:
    driver: bridge
