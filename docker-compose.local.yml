  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002", "--reload", "--log-level", "info"]

  # DEPRECATED: retrieval is now handled in-process by the `agent` service
  # (Chroma DB is embedded, see `agent_chroma_db` volume). See ./rag/README.md.
  # rag:
  #   build:
