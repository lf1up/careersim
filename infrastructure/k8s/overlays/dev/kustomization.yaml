apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careersim

resources:
  - ../../base
  - ingress.yaml

namePrefix: dev-

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-credentials
  - target:
      kind: StatefulSet
      name: rag
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-credentials
  - target:
      kind: Deployment
      name: transformers
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-credentials

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - DB_HOST=dev-postgres
      - DB_SSL=false
      - DB_LOGGING=false
      - REDIS_HOST=dev-redis
      - TRANSFORMERS_API_URL=http://dev-transformers:8001
      - RAG_API_URL=http://dev-rag:8002
      - ALLOWED_ORIGINS=https://api.careersim.ai,https://careersim.ai
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - LANGCHAIN_PROJECT=careersim-dev
      - USE_LANGGRAPH=true

secretGenerator:
  - name: app-secrets
    behavior: replace
    literals:
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=dev-secret-at-least-32-characters-long-for-validation-435e6670f51
      - JWT_REFRESH_SECRET=dev-refresh-secret-at-least-32-characters-long-435e6670f51
      - SESSION_SECRET=dev-session-secret-at-least-32-characters-long-435e6670f51
      - SMTP_USER=
      - SMTP_PASS=
      - OPENAI_API_KEY=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
      - STRIPE_SECRET_KEY=
      - STRIPE_WEBHOOK_SECRET=
      - STRIPE_PUBLISHABLE_KEY=
      - RAG_API_KEY=dev-token-eb4b864605e-min-32-chars-required-for-security
      - TRANSFORMERS_API_KEY=dev-token-bdd297cb5b5-min-32-chars-required-for-security
      - LANGGRAPH_DEPLOYMENT_URL=
      - LANGGRAPH_API_KEY=
      - LANGCHAIN_API_KEY=
      - GRAPH_ASSISTANT_ID=

images:
  - name: backend
    newName: ghcr.io/lf1up/careersim
    newTag: backend-main
  - name: rag
    newName: ghcr.io/lf1up/careersim
    newTag: rag-v2
  - name: transformers
    newName: ghcr.io/lf1up/careersim
    newTag: transformers-v2


