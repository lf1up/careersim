# Patch to add imagePullSecrets to all deployments/statefulsets
# This is needed for pulling from private GitHub Container Registry

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rag
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transformers
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
