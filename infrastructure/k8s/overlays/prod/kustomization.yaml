apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: careersim

resources:
  - ../../base
  - ingress.yaml

namePrefix: prod-

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - DB_HOST=prod-postgres
      - DB_LOGGING=true
      - REDIS_HOST=prod-redis
      - TRANSFORMERS_API_URL=http://prod-transformers:8001
      - RAG_API_URL=http://prod-rag:8002
      - ALLOWED_ORIGINS=http://localhost:3000
      - LANGCHAIN_PROJECT=careersim-prod
      - USE_LANGGRAPH=true

secretGenerator:
  - name: app-secrets
    behavior: replace
    literals:
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=prod-secret-at-least-32-characters-long-for-validation
      - JWT_REFRESH_SECRET=prod-refresh-secret-at-least-32-characters-long
      - SESSION_SECRET=prod-session-secret-at-least-32-characters-long
      - SMTP_USER=
      - SMTP_PASS=
      - OPENAI_API_KEY=
      - STRIPE_SECRET_KEY=
      - STRIPE_WEBHOOK_SECRET=
      - STRIPE_PUBLISHABLE_KEY=
      - RAG_API_KEY=prod-token-eb4b864605e-min-32-chars-required-for-security
      - TRANSFORMERS_API_KEY=prod-token-bdd297cb5b5-min-32-chars-required-for-security
      - LANGGRAPH_DEPLOYMENT_URL=
      - LANGGRAPH_API_KEY=
      - LANGCHAIN_API_KEY=
      - GRAPH_ASSISTANT_ID=

images:
  - name: backend
    newName: ghcr.io/lf1up/careersim
    newTag: backend-latest
  - name: rag
    newName: ghcr.io/lf1up/careersim
    newTag: rag-latest
  - name: transformers
    newName: ghcr.io/lf1up/careersim
    newTag: transformers-latest


