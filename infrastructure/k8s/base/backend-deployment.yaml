apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: careersim
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: careersim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: uploads
              mountPath: /uploads
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads


