apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  namespace: careersim
  labels:
    app.kubernetes.io/name: rag
    app.kubernetes.io/part-of: careersim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag
    spec:
      containers:
        - name: rag
          image: rag:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20


