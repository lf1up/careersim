apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rag
  namespace: careersim
  labels:
    app.kubernetes.io/name: rag
    app.kubernetes.io/part-of: careersim
spec:
  serviceName: rag
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag
    spec:
      containers:
        - name: rag
          image: rag:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RAG_API_KEY
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: rag-data
              mountPath: /app/chroma
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - 'import sys, httpx; r = httpx.get("http://localhost:8002/", timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)'
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - 'import sys, httpx; r = httpx.get("http://localhost:8002/", timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)'
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: rag-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

