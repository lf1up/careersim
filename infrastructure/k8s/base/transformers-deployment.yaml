apiVersion: apps/v1
kind: Deployment
metadata:
  name: transformers
  namespace: careersim
  labels:
    app.kubernetes.io/name: transformers
    app.kubernetes.io/part-of: careersim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transformers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transformers
    spec:
      containers:
        - name: transformers
          image: transformers:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"


