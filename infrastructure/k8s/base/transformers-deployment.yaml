apiVersion: apps/v1
kind: Deployment
metadata:
  name: transformers
  namespace: careersim
  labels:
    app.kubernetes.io/name: transformers
    app.kubernetes.io/part-of: careersim
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transformers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transformers
    spec:
      containers:
        - name: transformers
          image: transformers:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TRANSFORMERS_API_KEY
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            limits:
              # nvidia.com/gpu: "1"  # Commented out for M1 Mac testing (no NVIDIA GPU)
            requests:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - 'import sys, httpx; r = httpx.get("http://localhost:8001/", timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)'
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - 'import sys, httpx; r = httpx.get("http://localhost:8001/", timeout=5.0); sys.exit(0 if r.status_code == 200 else 1)'
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
      # nodeSelector:  # Commented out for M1 Mac testing (arm64 architecture)
      #   kubernetes.io/arch: amd64
      # tolerations:  # Commented out for M1 Mac testing (no NVIDIA GPU)
      #   - key: "nvidia.com/gpu"
      #     operator: "Exists"
      #     effect: "NoSchedule"


