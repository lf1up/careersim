version: '3.8'

services:
  transformers-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # Override cache paths for container
      - TRANSFORMERS_CACHE=/app/models_cache
      - HF_HOME=/app/models_cache
    volumes:
      # Mount for development - comment out for production
      - .:/app
      # Persistent volume for model cache (optional for production)
      - models_cache:/app/models_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Development service with live reloading
  transformers-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # Override cache paths for container
      - TRANSFORMERS_CACHE=/app/models_cache
      - HF_HOME=/app/models_cache
      # Override for development
      - AUTH_REQUIRED=false
    volumes:
      # Mount source code for live reloading
      - .:/app
      # Persistent volume for model cache
      - models_cache:/app/models_cache
    restart: unless-stopped
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev

volumes:
  models_cache:
    driver: local